<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>TON TEMPLE</title>

<style>
:root{
--gold:#d8b35a;
--gold2:#f0d38b;
--text:#f2f2f2;
--muted:rgba(242,242,242,.7);
--safeT:env(safe-area-inset-top);
--safeB:env(safe-area-inset-bottom);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
radial-gradient(1200px 700px at 50% 10%, rgba(216,179,90,.18), transparent 60%),
radial-gradient(800px 600px at 20% 80%, rgba(216,179,90,.08), transparent 60%),
linear-gradient(180deg,#070707,#030303);
color:var(--text);
}

.app{
padding:calc(14px + var(--safeT)) 14px calc(18px + var(--safeB));
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.brand{
display:flex;
flex-direction:column;
gap:6px;
}

.coin{
width:56px;height:56px;border-radius:999px;
display:grid;place-items:center;
font-size:28px;font-weight:900;color:#f6e2a6;

background:
radial-gradient(circle at 30% 30%, rgba(255,255,255,.4), transparent 60%),
linear-gradient(180deg,#f0d38b,#6f551f);

border:1px solid rgba(240,211,139,.6);

box-shadow:
0 12px 30px rgba(0,0,0,.7),
0 0 40px rgba(240,211,139,.35),
inset 0 4px 10px rgba(255,255,255,.35),
inset 0 -14px 28px rgba(0,0,0,.8);
}

.brandName{
font-size:18px;font-weight:900;letter-spacing:2px;
}
.brandTag{
font-size:12px;color:var(--muted);
}

/* CONTROLS */

.controls{
display:flex;flex-direction:column;gap:8px;align-items:flex-end;
}
.row{display:flex;gap:6px;}

.pill{
padding:10px 14px;border-radius:999px;
background:rgba(0,0,0,.4);
border:1px solid rgba(216,179,90,.25);
font-weight:800;font-size:12px;
cursor:pointer;
}

.pill.active{
background:linear-gradient(180deg,#f0d38b,#b8963e);
color:#111;
box-shadow:0 0 15px rgba(240,211,139,.3);
}

.iconBtn{
width:42px;height:42px;border-radius:999px;
border:1px solid rgba(216,179,90,.3);
background:rgba(0,0,0,.35);
display:grid;place-items:center;
cursor:pointer;
}

/* STAGE */

.stage{
border-radius:26px;
padding:14px;
background:
radial-gradient(800px 500px at 50% 0%, rgba(216,179,90,.12), transparent 60%),
rgba(0,0,0,.35);
border:1px solid rgba(216,179,90,.2);

box-shadow:
0 30px 80px rgba(0,0,0,.8),
inset 0 0 60px rgba(216,179,90,.1);
}

/* SIGIL */

.sigil{
margin-top:6px;
aspect-ratio:1/1;
border-radius:22px;
display:grid;place-items:center;
position:relative;

background:
radial-gradient(circle at 50% 50%, rgba(240,211,139,.18), transparent 70%),
rgba(0,0,0,.25);

border:1px solid rgba(216,179,90,.3);
}

.sigil:before{
content:"";
position:absolute;
inset:10%;
border-radius:999px;
border:1px solid rgba(240,211,139,.35);
box-shadow:0 0 30px rgba(240,211,139,.25);
}

.sigilMark{
font-size:100px;
font-weight:900;
color:#f6e2a6;
text-shadow:
0 0 20px rgba(240,211,139,.7),
0 0 50px rgba(240,211,139,.3);
}

/* CTA */

.cta{
margin-top:16px;
width:100%;
padding:16px;
border-radius:999px;
border:1px solid rgba(216,179,90,.35);

background:
radial-gradient(40px 20px at 30% 20%, rgba(255,255,255,.25), transparent 60%),
linear-gradient(180deg,#f0d38b,#b8963e);

color:#111;
font-weight:900;
letter-spacing:2px;
cursor:pointer;

box-shadow:
0 20px 50px rgba(0,0,0,.7),
inset 0 2px 6px rgba(255,255,255,.3);
}

/* SECOND ROW */

.row2{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn2{
padding:14px;
border-radius:999px;
border:1px solid rgba(216,179,90,.25);
background:rgba(0,0,0,.35);
font-weight:900;
cursor:pointer;
}

/* CARD */

.card{
margin-top:14px;
padding:16px;
border-radius:22px;
border:1px solid rgba(216,179,90,.25);
background:
radial-gradient(400px 200px at 50% 0%, rgba(216,179,90,.12), transparent 70%),
rgba(0,0,0,.35);

box-shadow:
0 20px 60px rgba(0,0,0,.6),
inset 0 0 30px rgba(216,179,90,.1);
}

.label{margin-top:10px;font-weight:900;}
.text{margin-top:8px;font-size:15px;line-height:1.4;}

.actions{
margin-top:12px;
display:flex;
gap:8px;
}

.act{
flex:1;
padding:12px;
border-radius:999px;
border:1px solid rgba(216,179,90,.25);
background:rgba(0,0,0,.35);
cursor:pointer;
}

.foot{
margin-top:8px;
font-size:12px;
color:rgba(255,255,255,.5);
}
</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="brand">
<div class="coin">财</div>
<div class="brandName" id="brandName">TON TEMPLE</div>
<div class="brandTag" id="brandTag">Fa Cai Supreme AI</div>
</div>

<div class="controls">

<div class="row">
<div class="pill active" id="modeRitual">RITUAL</div>
<div class="pill" id="modePro">PRO</div>
<div class="iconBtn" id="helpBtn">?</div>
</div>

<div class="row">
<div class="pill active" id="langZh">中文</div>
<div class="pill" id="langEn">EN</div>
<div class="iconBtn" id="soundBtn">🔊</div>
</div>

</div>

</div>

<div class="stage">

<div class="sigil">
<div class="sigilMark">财</div>
</div>

<div class="cta" id="activate">ACTIVATE FLOW</div>

<div class="row2">
<div class="btn2" id="oracleBtn">ORACLE</div>
<div class="btn2" id="altarBtn">GOLDEN ALTAR</div>
</div>

<div class="card">
<div><b id="forecastTitle">FORECAST</b></div>
<div class="label" id="guidanceTitle">TEMPLE GUIDANCE:</div>
<div class="text" id="guidanceText">Signal: don’t scatter attention.</div>

<div class="actions">
<div class="act" id="enterBtn">ENTER</div>
<div class="act" id="waitBtn">WAIT</div>
<div class="act" id="skipBtn">SKIP</div>
</div>

<div class="foot" id="disclaimer">Not financial advice</div>
</div>

</div>

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
const tg = window.Telegram?.WebApp;
tg?.ready();

const I18N = {
zh:{activate:"启动流",enter:"进入",wait:"等待",skip:"跳过"},
en:{activate:"ACTIVATE FLOW",enter:"ENTER",wait:"WAIT",skip:"SKIP"}
};

let lang="en";

function applyLang(){
const t=I18N[lang];
document.getElementById("activate").innerText=t.activate;
document.getElementById("enterBtn").innerText=t.enter;
document.getElementById("waitBtn").innerText=t.wait;
document.getElementById("skipBtn").innerText=t.skip;
}

langZh.onclick=()=>{lang="zh";applyLang();}
langEn.onclick=()=>{lang="en";applyLang();}

helpBtn.onclick=()=>{
alert(lang==="zh"?"先点启动流":"Tap activate first");
};

soundBtn.onclick=()=>{
soundBtn.innerText = soundBtn.innerText==="🔊"?"🔇":"🔊";
};

applyLang();
</script>

</body>
