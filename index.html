<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>TON TEMPLE</title>

  <style>
    :root{
      --bg0:#050505;
      --bg1:#0b0b0b;
      --gold:#d8b35a;
      --gold2:#f0d38b;
      --text:#f2f2f2;
      --muted:rgba(242,242,242,.72);
      --line:rgba(216,179,90,.22);
      --line2:rgba(216,179,90,.12);
      --shadow:0 24px 70px rgba(0,0,0,.65);

      --safeT: env(safe-area-inset-top);
      --safeB: env(safe-area-inset-bottom);
    }

    *{
      box-sizing:border-box;
      min-width:0;
    }

    html,body{
      height:100%;
      width:100%;
      margin:0;
      padding:0;
      overflow-x:hidden;
    }

    body{
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 50% 20%, rgba(216,179,90,.18) 0%, rgba(0,0,0,0) 55%),
        radial-gradient(900px 700px at 20% 70%, rgba(216,179,90,.10) 0%, rgba(0,0,0,0) 55%),
        linear-gradient(180deg, #070707 0%, #040404 100%);
      -webkit-font-smoothing:antialiased;
      overflow-x:hidden;
    }

    .app{
      width:100%;
      max-width:100vw;
      overflow-x:hidden;
      min-height:100%;
      padding:
        calc(14px + var(--safeT))
        14px
        calc(18px + var(--safeB))
        14px;
    }

    .shell{
      width:100%;
      max-width:980px;
      margin:0 auto;
      overflow:hidden;
    }

    /* ================= HEADER ================= */

    .header{
      width:100%;
      max-width:980px;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto auto;
      gap:10px;
      align-items:start;
      margin-bottom:14px;
    }

    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:0;
      overflow:hidden;
    }

    .coin{
      width:46px;
      height:46px;
      border-radius:999px;
      position:relative;
      flex:0 0 auto;
      background:
        radial-gradient(16px 16px at 35% 30%, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 60%),
        radial-gradient(26px 26px at 68% 76%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 62%),
        linear-gradient(180deg, rgba(240,211,139,.28), rgba(216,179,90,.08)),
        radial-gradient(60px 60px at 30% 20%, rgba(216,179,90,.34) 0%, rgba(0,0,0,0) 60%),
        rgba(0,0,0,.58);
      border:1px solid rgba(216,179,90,.38);
      box-shadow:
        0 12px 30px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.10),
        inset 0 -6px 14px rgba(0,0,0,.55);
    }

    .coin:before{
      content:"";
      position:absolute;
      inset:5px;
      border-radius:999px;
      border:1px solid rgba(216,179,90,.24);
      box-shadow:inset 0 0 0 1px rgba(0,0,0,.42);
    }

    .coin span{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:22px;
      letter-spacing:.5px;
      color:rgba(240,211,139,.95);
      text-shadow:0 2px 10px rgba(0,0,0,.7);
    }

    .brandText{
      min-width:0;
      overflow:hidden;
      padding-top:2px;
    }

    .brandName{
      font-weight:900;
      font-size:18px;
      letter-spacing:3px;
      text-transform:uppercase;
      line-height:1.05;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .brandTag{
      margin-top:5px;
      font-size:13px;
      color:var(--muted);
      line-height:1.15;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* center controls */
    .centerControls{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      justify-content:flex-start;
      min-width:0;
    }

    .pillGroup{
      display:flex;
      align-items:center;
      gap:4px;
      padding:4px;
      border-radius:999px;
      background:rgba(0,0,0,.38);
      border:1px solid rgba(216,179,90,.18);
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      max-width:100%;
      overflow:hidden;
    }

    .pill{
      border:0;
      background:transparent;
      color:rgba(242,242,242,.86);
      border-radius:999px;
      padding:10px 14px;
      font-weight:800;
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:13px;
      line-height:1;
      cursor:pointer;
      white-space:nowrap;
      max-width:100%;
      flex:0 1 auto;
    }

    .pill.small{
      padding:9px 12px;
      font-size:12px;
      letter-spacing:1.5px;
      min-width:66px;
      text-transform:none;
    }

    .pill.active{
      background:
        radial-gradient(30px 22px at 30% 25%, rgba(255,255,255,.20) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(240,211,139,.55) 0%, rgba(216,179,90,.24) 100%);
      color:#14100a;
      box-shadow:0 10px 24px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.22);
      border:1px solid rgba(216,179,90,.30);
    }

    /* right icons */
    .rightIcons{
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      flex:0 0 auto;
    }

    .iconBtn{
      width:44px;
      height:44px;
      border-radius:999px;
      border:1px solid rgba(216,179,90,.22);
      background:rgba(0,0,0,.38);
      color:rgba(242,242,242,.88);
      display:grid;
      place-items:center;
      font-weight:900;
      font-size:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      cursor:pointer;
      flex:0 0 auto;
    }

    /* ================= MAIN ================= */

    .panel{
      width:100%;
      max-width:980px;
      position:relative;
      border-radius:28px;
      padding:10px 18px 18px;
      overflow:hidden;
    }

    .stage{
      border-radius:26px;
      border:1px solid var(--line);
      background:
        radial-gradient(900px 600px at 50% 15%, rgba(216,179,90,.12) 0%, rgba(0,0,0,0) 55%),
        rgba(0,0,0,.30);
      box-shadow:var(--shadow);
      padding:14px;
      position:relative;
      overflow:hidden;
      width:100%;
      max-width:100%;
    }

    .stage:before{
      content:"";
      position:absolute;
      inset:-1px;
      border-radius:26px;
      border:1px solid rgba(216,179,90,.10);
      pointer-events:none;
    }

    .sigilBox{
      width:100%;
      border-radius:22px;
      border:1px solid rgba(216,179,90,.16);
      padding:18px;
      background:rgba(0,0,0,.20);
      overflow:hidden;
    }

    .sigil{
      width:100%;
      aspect-ratio:1/1;
      max-width:100%;
      border-radius:22px;
      border:1px solid rgba(216,179,90,.18);
      background:
        radial-gradient(260px 260px at 50% 50%, rgba(216,179,90,.10) 0%, rgba(0,0,0,0) 60%),
        rgba(0,0,0,.16);
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }

    .sigil:before{
      content:"";
      width:72%;
      aspect-ratio:1/1;
      border-radius:999px;
      border:1px solid rgba(216,179,90,.20);
      position:absolute;
      max-width:100%;
    }

    .sigilMark{
      font-size:clamp(54px, 14vw, 86px);
      font-weight:900;
      color:rgba(240,211,139,.96);
      text-shadow:0 18px 46px rgba(0,0,0,.7);
      letter-spacing:1px;
      position:relative;
      z-index:1;
    }

    .cta{
      width:100%;
      margin-top:16px;
      display:block;
      border:1px solid rgba(216,179,90,.22);
      border-radius:999px;
      padding:16px 18px;
      background:
        radial-gradient(32px 22px at 25% 30%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(240,211,139,.40) 0%, rgba(216,179,90,.16) 100%),
        rgba(0,0,0,.25);
      color:rgba(242,242,242,.92);
      font-weight:900;
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:clamp(14px, 3.3vw, 17px);
      cursor:pointer;
      box-shadow:0 16px 50px rgba(0,0,0,.55);
      max-width:100%;
    }

    .row2{
      width:100%;
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      max-width:100%;
    }

    .btn2{
      border-radius:999px;
      padding:14px 16px;
      border:1px solid rgba(216,179,90,.18);
      background:rgba(0,0,0,.26);
      color:rgba(242,242,242,.90);
      font-weight:900;
      letter-spacing:2.2px;
      text-transform:uppercase;
      font-size:13px;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      max-width:100%;
    }

    .card{
      width:100%;
      margin-top:14px;
      border-radius:22px;
      border:1px solid rgba(216,179,90,.18);
      background:rgba(0,0,0,.26);
      padding:16px;
      max-width:100%;
      overflow:hidden;
    }

    .hRow{
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .hTitle{
      font-weight:900;
      letter-spacing:3px;
      text-transform:uppercase;
      font-size:14px;
      opacity:.92;
    }

    .chips{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      min-width:0;
      max-width:100%;
    }

    .chip{
      border-radius:999px;
      border:1px solid rgba(216,179,90,.18);
      background:rgba(0,0,0,.22);
      padding:9px 12px;
      font-weight:800;
      letter-spacing:1.8px;
      text-transform:uppercase;
      font-size:12px;
      color:rgba(242,242,242,.88);
      white-space:nowrap;
      max-width:100%;
    }

    .chip.active{
      background:
        radial-gradient(20px 14px at 30% 30%, rgba(255,255,255,.18) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(180deg, rgba(240,211,139,.45) 0%, rgba(216,179,90,.18) 100%);
      color:#140f07;
      border-color:rgba(216,179,90,.30);
    }

    .label{
      margin-top:12px;
      font-weight:900;
      letter-spacing:2.2px;
      text-transform:uppercase;
      font-size:13px;
      opacity:.92;
    }

    .text{
      margin-top:10px;
      color:rgba(242,242,242,.92);
      font-size:16px;
      line-height:1.45;
      max-width:100%;
      word-break:break-word;
    }

    .actions{
      margin-top:14px;
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
      width:100%;
      max-width:100%;
    }

    .act{
      border-radius:999px;
      padding:12px 12px;
      border:1px solid rgba(216,179,90,.18);
      background:rgba(0,0,0,.22);
      color:rgba(242,242,242,.90);
      font-weight:900;
      letter-spacing:2px;
      text-transform:uppercase;
      font-size:12px;
      cursor:pointer;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.06);
      max-width:100%;
    }

    .foot{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:rgba(242,242,242,.55);
      letter-spacing:.02em;
      max-width:100%;
    }

    /* mobile */
    @media (max-width: 480px){
      .header{
        grid-template-columns:minmax(0,1fr) auto auto;
        gap:8px;
      }

      .brand{
        min-width:0;
      }

      .coin{
        width:40px;
        height:40px;
      }

      .coin span{
        font-size:20px;
      }

      .brandName{
        font-size:16px;
        letter-spacing:2.4px;
      }

      .brandTag{
        font-size:12px;
      }

      .pill{
        padding:9px 12px;
        min-width:68px;
        font-size:12px;
        letter-spacing:1.4px;
      }

      .pill.small{
        min-width:60px;
        font-size:12px;
        padding:8px 10px;
      }

      .iconBtn{
        width:40px;
        height:40px;
        font-size:17px;
      }

      .panel{
        padding:8px 0 0;
      }

      .stage{
        padding:12px;
      }

      .sigilBox{
        padding:12px;
      }

      .text{
        font-size:15px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="shell">
      <div class="header">
        <div class="brand">
          <div class="coin" aria-hidden="true"><span>财</span></div>
          <div class="brandText">
            <div class="brandName" id="brandName">TON TEMPLE</div>
            <div class="brandTag" id="brandTag">Fa Cai Supreme AI</div>
          </div>
        </div>

        <div class="centerControls">
          <div class="pillGroup" aria-label="mode">
            <button class="pill active" id="modeRitual" type="button">RITUAL</button>
            <button class="pill" id="modePro" type="button">PRO</button>
          </div>

          <div class="pillGroup" aria-label="language">
            <button class="pill small active" id="langZh" type="button">中文</button>
            <button class="pill small" id="langEn" type="button">EN</button>
          </div>
        </div>

        <div class="rightIcons">
          <button class="iconBtn" id="helpBtn" type="button">?</button>
          <button class="iconBtn on" id="soundBtn" type="button">🔊</button>
        </div>
      </div>

      <div class="panel">
        <div class="stage">
          <div class="sigilBox">
            <div class="sigil">
              <div class="sigilMark" id="sigilMark">财</div>
            </div>

            <button class="cta" id="activate" type="button">ACTIVATE FLOW</button>

            <div class="row2">
              <button class="btn2" id="oracleBtn" type="button">ORACLE</button>
              <button class="btn2" id="altarBtn" type="button">GOLDEN ALTAR</button>
            </div>

            <div class="card">
              <div class="hRow">
                <div class="hTitle" id="forecastTitle">FORECAST</div>
                <div class="chips">
                  <div class="chip active" id="chipDay">DAY</div>
                  <div class="chip" id="chipTon">TON</div>
                  <div class="chip" id="chipLimit">LIMIT: 1/1</div>
                </div>
              </div>

              <div class="label" id="guidanceTitle">TEMPLE GUIDANCE:</div>
              <div class="text" id="guidanceText">Signal: don’t scatter attention. One step — one result.</div>

              <div class="actions">
                <button class="act" id="enterBtn" type="button">ENTER</button>
                <button class="act" id="waitBtn" type="button">WAIT</button>
                <button class="act" id="skipBtn" type="button">SKIP</button>
              </div>

              <div class="foot" id="disclaimer">Ritualized interface. Not financial advice.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    const tg = window.Telegram?.WebApp;
    try {
      tg?.ready();
      tg?.expand();
      tg?.setHeaderColor?.("#050505");
      tg?.setBackgroundColor?.("#050505");
    } catch(e) {}

    const I18N = {
      zh: {
        brandName: "TON TEMPLE",
        brandTag: "Fa Cai Supreme AI",
        modeRitual: "仪式",
        modePro: "PRO",
        activate: "启动流",
        oracle: "神谕",
        altar: "金坛",
        forecast: "预测",
        chipDay: "日",
        chipTon: "TON",
        chipLimit: "额度：1/1",
        guidanceTitle: "庙堂指引：",
        guidanceText: "信号：不要分散注意力。一步——一个结果。",
        enter: "进入",
        wait: "等待",
        skip: "跳过",
        disclaimer: "仪式化界面。非投资建议。"
      },
      en: {
        brandName: "TON TEMPLE",
        brandTag: "Fa Cai Supreme AI",
        modeRitual: "RITUAL",
        modePro: "PRO",
        activate: "ACTIVATE FLOW",
        oracle: "ORACLE",
        altar: "GOLDEN ALTAR",
        forecast: "FORECAST",
        chipDay: "DAY",
        chipTon: "TON",
        chipLimit: "LIMIT: 1/1",
        guidanceTitle: "TEMPLE GUIDANCE:",
        guidanceText: "Signal: don’t scatter attention. One step — one result.",
        enter: "ENTER",
        wait: "WAIT",
        skip: "SKIP",
        disclaimer: "Ritualized interface. Not financial advice."
      }
    };

    let lang = "zh";
    let soundOn = true;
    let mode = "ritual";

    const modeRitual = document.getElementById("modeRitual");
    const modePro = document.getElementById("modePro");
    const langZh = document.getElementById("langZh");
    const langEn = document.getElementById("langEn");
    const soundBtn = document.getElementById("soundBtn");

    function setActive(a, b, activeA){
      a.classList.toggle("active", activeA);
      b.classList.toggle("active", !activeA);
    }

    function applyLang(){
      const t = I18N[lang];
      document.documentElement.lang = (lang === "zh") ? "zh" : "en";

      document.getElementById("brandName").textContent = t.brandName;
      document.getElementById("brandTag").textContent = t.brandTag;
      document.getElementById("modeRitual").textContent = t.modeRitual;
      document.getElementById("modePro").textContent = t.modePro;
      document.getElementById("activate").textContent = t.activate;
      document.getElementById("oracleBtn").textContent = t.oracle;
      document.getElementById("altarBtn").textContent = t.altar;
      document.getElementById("forecastTitle").textContent = t.forecast;
      document.getElementById("chipDay").textContent = t.chipDay;
      document.getElementById("chipTon").textContent = t.chipTon;
      document.getElementById("chipLimit").textContent = t.chipLimit;
      document.getElementById("guidanceTitle").textContent = t.guidanceTitle;
      document.getElementById("guidanceText").textContent = t.guidanceText;
      document.getElementById("enterBtn").textContent = t.enter;
      document.getElementById("waitBtn").textContent = t.wait;
      document.getElementById("skipBtn").textContent = t.skip;
      document.getElementById("disclaimer").textContent = t.disclaimer;
    }

    modeRitual.addEventListener("click", ()=>{
      mode = "ritual";
      setActive(modeRitual, modePro, true);
      tg?.HapticFeedback?.impactOccurred?.("light");
    });

    modePro.addEventListener("click", ()=>{
      mode = "pro";
      setActive(modeRitual, modePro, false);
      tg?.HapticFeedback?.impactOccurred?.("light");
    });

    langZh.addEventListener("click", ()=>{
      lang = "zh";
      setActive(langZh, langEn, true);
      applyLang();
      tg?.HapticFeedback?.impactOccurred?.("light");
    });

    langEn.addEventListener("click", ()=>{
      lang = "en";
      setActive(langZh, langEn, false);
      applyLang();
      tg?.HapticFeedback?.impactOccurred?.("light");
    });

    document.getElementById("helpBtn").addEventListener("click", ()=>{
      const msg = lang === "zh"
        ? "提示：先按“启动流”，然后选择“神谕 / 金坛”。"
        : "Tip: tap ACTIVATE FLOW, then choose ORACLE / GOLDEN ALTAR.";
      if (tg?.showPopup) {
        tg.showPopup({ title:"TON TEMPLE", message: msg, buttons:[{type:"ok"}] });
      } else {
        alert(msg);
      }
    });

    soundBtn.addEventListener("click", ()=>{
      soundOn = !soundOn;
      soundBtn.textContent = soundOn ? "🔊" : "🔇";
      tg?.HapticFeedback?.impactOccurred?.("light");
    });

    document.getElementById("activate").addEventListener("click", ()=>{
      tg?.HapticFeedback?.notificationOccurred?.("success");
    });

    applyLang();
  </script>
</body>
</html>
