<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>TON TEMPLE</title>

<style>
:root{
--gold:#d8b35a;
--gold2:#f0d38b;
--text:#f2f2f2;
--muted:rgba(242,242,242,.7);
--safeT:env(safe-area-inset-top);
--safeB:env(safe-area-inset-bottom);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
radial-gradient(1000px 600px at 50% 20%, rgba(216,179,90,.15), transparent 60%),
linear-gradient(180deg,#070707,#040404);
color:var(--text);
}

.app{
padding:calc(14px + var(--safeT)) 14px calc(18px + var(--safeB));
max-width:100vw;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

/* LEFT SIDE */

.brand{
display:flex;
flex-direction:column;
gap:6px;
}

.coin{
width:56px;
height:56px;
border-radius:999px;
display:grid;
place-items:center;
font-size:28px;
font-weight:900;
color:#f6e2a6;

background:
radial-gradient(circle at 30% 30%, rgba(255,255,255,.4), transparent 60%),
linear-gradient(180deg,#f0d38b,#6f551f);

border:1px solid rgba(240,211,139,.6);

box-shadow:
0 12px 30px rgba(0,0,0,.6),
0 0 35px rgba(240,211,139,.3),
inset 0 3px 8px rgba(255,255,255,.35),
inset 0 -12px 25px rgba(0,0,0,.7);
}

.brandName{
font-size:18px;
font-weight:900;
letter-spacing:2px;
}

.brandTag{
font-size:12px;
color:var(--muted);
}

/* RIGHT SIDE */

.controls{
display:flex;
flex-direction:column;
gap:8px;
align-items:flex-end;
}

.row{
display:flex;
gap:6px;
}

.pill{
padding:10px 14px;
border-radius:999px;
background:rgba(0,0,0,.35);
border:1px solid rgba(216,179,90,.25);
font-weight:800;
font-size:12px;
white-space:nowrap;
}

.pill.active{
background:linear-gradient(180deg,#f0d38b,#b8963e);
color:#111;
}

.iconBtn{
width:42px;
height:42px;
border-radius:999px;
border:1px solid rgba(216,179,90,.3);
background:rgba(0,0,0,.35);
display:grid;
place-items:center;
font-size:16px;
}

/* MAIN */

.sigil{
margin-top:10px;
aspect-ratio:1/1;
border-radius:24px;
display:grid;
place-items:center;

background:
radial-gradient(circle, rgba(240,211,139,.18), transparent 70%),
rgba(0,0,0,.25);

border:1px solid rgba(216,179,90,.3);

box-shadow:
0 20px 60px rgba(0,0,0,.7),
inset 0 0 60px rgba(216,179,90,.2);
}

.sigilMark{
font-size:96px;
font-weight:900;
color:#f6e2a6;

text-shadow:
0 0 20px rgba(240,211,139,.7),
0 0 40px rgba(240,211,139,.3);
}

.cta{
margin-top:16px;
width:100%;
padding:16px;
border-radius:999px;
border:1px solid rgba(216,179,90,.35);

background:
linear-gradient(180deg,#f0d38b,#b8963e);

font-weight:900;
letter-spacing:2px;
font-size:14px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<!-- LEFT -->
<div class="brand">
<div class="coin">财</div>
<div class="brandName">TON TEMPLE</div>
<div class="brandTag">Fa Cai Supreme AI</div>
</div>

<!-- RIGHT -->
<div class="controls">

<div class="row">
<div class="pill active">RITUAL</div>
<div class="pill">PRO</div>
<div class="iconBtn">?</div>
</div>

<div class="row">
<div class="pill active">中文</div>
<div class="pill">EN</div>
<div class="iconBtn">🔊</div>
</div>

</div>

</div>

<div class="sigil">
<div class="sigilMark">财</div>
</div>

<button class="cta">ACTIVATE FLOW</button>

</div>

</body>
</html>
