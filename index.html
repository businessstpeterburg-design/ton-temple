<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>TON TEMPLE</title>

<style>
:root{
--gold:#d8b35a;
--text:#f2f2f2;
--muted:rgba(242,242,242,.72);
--safeT: env(safe-area-inset-top);
--safeB: env(safe-area-inset-bottom);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
radial-gradient(1200px 700px at 50% 20%, rgba(216,179,90,.18), transparent 55%),
radial-gradient(900px 700px at 20% 70%, rgba(216,179,90,.10), transparent 55%),
linear-gradient(180deg, #070707, #040404);
}

.app{
padding:calc(14px + var(--safeT)) 14px calc(18px + var(--safeB));
max-width:480px;
margin:auto;
}

/* SIGIL */

.sigil{
border-radius:24px;
border:1px solid rgba(216,179,90,.2);
padding:20px;
background:rgba(0,0,0,.35);
box-shadow:0 20px 70px rgba(0,0,0,.7);
}

.sigilInner{
aspect-ratio:1/1;
border-radius:22px;
border:1px solid rgba(216,179,90,.2);
display:grid;
place-items:center;
background:
radial-gradient(260px 260px at 50% 50%, rgba(216,179,90,.10), transparent 60%);
}

.sigilMark{
font-size:80px;
font-weight:900;
color:#f0d38b;
text-shadow:0 0 40px rgba(240,211,139,.4);
}

/* CTA */

.cta{
margin-top:16px;
width:100%;
padding:16px;
border-radius:999px;
border:1px solid rgba(216,179,90,.25);
background:linear-gradient(180deg, rgba(240,211,139,.4), rgba(216,179,90,.2));
font-weight:900;
letter-spacing:2px;
cursor:pointer;
}

/* BUTTONS */

.row2{
margin-top:14px;
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.btn{
padding:14px;
border-radius:999px;
border:1px solid rgba(216,179,90,.18);
background:rgba(0,0,0,.3);
text-align:center;
cursor:pointer;
}

/* CARD */

.card{
margin-top:14px;
border-radius:22px;
border:1px solid rgba(216,179,90,.18);
background:rgba(0,0,0,.25);
padding:16px;
}

.chips{
display:flex;
gap:8px;
margin-top:8px;
}

.chip{
padding:8px 12px;
border-radius:999px;
border:1px solid rgba(216,179,90,.18);
}

.chip.active{
background:linear-gradient(180deg,#f0d38b,#b8963e);
color:#111;
}

.text{
margin-top:12px;
font-size:15px;
line-height:1.4;
}

.actions{
margin-top:12px;
display:flex;
gap:8px;
}

.act{
flex:1;
padding:12px;
border-radius:999px;
border:1px solid rgba(216,179,90,.18);
text-align:center;
cursor:pointer;
}

.foot{
margin-top:10px;
font-size:12px;
color:rgba(255,255,255,.5);
}
</style>
</head>

<body>

<div class="app">

<div class="sigil">
<div class="sigilInner">
<div class="sigilMark">财</div>
</div>

<div class="cta" id="activate">ACTIVATE FLOW</div>

<div class="row2">
<div class="btn" id="oracleBtn">ORACLE</div>
<div class="btn" id="altarBtn">GOLDEN ALTAR</div>
</div>

<div class="card">
<b id="forecastTitle">FORECAST</b>

<div class="chips">
<div class="chip active">DAY</div>
<div class="chip">TON</div>
<div class="chip">LIMIT: 1/1</div>
</div>

<div class="text" id="guidanceText">
Signal: don’t scatter attention. One step — one result.
</div>

<div class="actions">
<div class="act" id="enterBtn">ENTER</div>
<div class="act" id="waitBtn">WAIT</div>
<div class="act" id="skipBtn">SKIP</div>
</div>

<div class="foot">Ritualized interface. Not financial advice.</div>
</div>

</div>

</div>

<script>
const I18N={
zh:{
activate:"启动流",
enter:"进入",
wait:"等待",
skip:"跳过",
text:"信号：不要分散注意力。一步——一个结果。"
},
en:{
activate:"ACTIVATE FLOW",
enter:"ENTER",
wait:"WAIT",
skip:"SKIP",
text:"Signal: don’t scatter attention. One step — one result."
}
};

let lang="en";

function applyLang(){
let t=I18N[lang];
activate.innerText=t.activate;
enterBtn.innerText=t.enter;
waitBtn.innerText=t.wait;
skipBtn.innerText=t.skip;
guidanceText.innerText=t.text;
}

applyLang();
</script>

</body>
</html>
