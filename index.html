<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>TON TEMPLE</title>

<style>
:root{
--gold:#d8b35a;
--gold2:#f0d38b;
--text:#f2f2f2;
--muted:rgba(242,242,242,.7);
--safeT:env(safe-area-inset-top);
--safeB:env(safe-area-inset-bottom);
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:
radial-gradient(1000px 600px at 50% 20%, rgba(216,179,90,.15), transparent 60%),
linear-gradient(180deg,#070707,#040404);
color:var(--text);
}

.app{
padding:calc(14px + var(--safeT)) 14px calc(18px + var(--safeB));
max-width:100vw;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-bottom:16px;
}

.brand{
display:flex;
flex-direction:column;
gap:6px;
}

.coin{
width:56px;
height:56px;
border-radius:999px;
display:grid;
place-items:center;
font-size:28px;
font-weight:900;
color:#f6e2a6;

background:
radial-gradient(circle at 30% 30%, rgba(255,255,255,.4), transparent 60%),
linear-gradient(180deg,#f0d38b,#6f551f);

border:1px solid rgba(240,211,139,.6);

box-shadow:
0 12px 30px rgba(0,0,0,.6),
0 0 35px rgba(240,211,139,.3),
inset 0 3px 8px rgba(255,255,255,.35),
inset 0 -12px 25px rgba(0,0,0,.7);
}

.brandName{
font-size:18px;
font-weight:900;
letter-spacing:2px;
}

.brandTag{
font-size:12px;
color:var(--muted);
}

.controls{
display:flex;
flex-direction:column;
gap:8px;
align-items:flex-end;
}

.row{
display:flex;
gap:6px;
}

.pill{
padding:10px 14px;
border-radius:999px;
background:rgba(0,0,0,.35);
border:1px solid rgba(216,179,90,.25);
font-weight:800;
font-size:12px;
white-space:nowrap;
cursor:pointer;
}

.pill.active{
background:linear-gradient(180deg,#f0d38b,#b8963e);
color:#111;
}

.iconBtn{
width:42px;
height:42px;
border-radius:999px;
border:1px solid rgba(216,179,90,.3);
background:rgba(0,0,0,.35);
display:grid;
place-items:center;
font-size:16px;
cursor:pointer;
}

/* MAIN */

.sigil{
margin-top:10px;
aspect-ratio:1/1;
border-radius:24px;
display:grid;
place-items:center;

background:
radial-gradient(circle, rgba(240,211,139,.18), transparent 70%),
rgba(0,0,0,.25);

border:1px solid rgba(216,179,90,.3);

box-shadow:
0 20px 60px rgba(0,0,0,.7),
inset 0 0 60px rgba(216,179,90,.2);
}

.sigilMark{
font-size:96px;
font-weight:900;
color:#f6e2a6;
text-shadow:
0 0 20px rgba(240,211,139,.7),
0 0 40px rgba(240,211,139,.3);
}

.cta{
margin-top:16px;
width:100%;
padding:16px;
border-radius:999px;
border:1px solid rgba(216,179,90,.35);
background:linear-gradient(180deg,#f0d38b,#b8963e);
font-weight:900;
letter-spacing:2px;
cursor:pointer;
}

.row2{
margin-top:12px;
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.btn2{
padding:14px;
border-radius:999px;
border:1px solid rgba(216,179,90,.25);
background:rgba(0,0,0,.3);
font-weight:900;
cursor:pointer;
}

.card{
margin-top:14px;
padding:16px;
border-radius:20px;
border:1px solid rgba(216,179,90,.25);
background:rgba(0,0,0,.3);
}

.label{margin-top:10px;font-weight:900;}
.text{margin-top:8px;font-size:15px;}
.actions{margin-top:12px;display:flex;gap:8px;}
.act{
flex:1;
padding:12px;
border-radius:999px;
border:1px solid rgba(216,179,90,.25);
background:rgba(0,0,0,.3);
cursor:pointer;
}
.foot{margin-top:8px;font-size:12px;color:rgba(255,255,255,.5);}

</style>
</head>

<body>

<div class="app">

<div class="header">

<div class="brand">
<div class="coin">财</div>
<div class="brandName" id="brandName">TON TEMPLE</div>
<div class="brandTag" id="brandTag">Fa Cai Supreme AI</div>
</div>

<div class="controls">

<div class="row">
<div class="pill active" id="modeRitual">RITUAL</div>
<div class="pill" id="modePro">PRO</div>
<div class="iconBtn" id="helpBtn">?</div>
</div>

<div class="row">
<div class="pill active" id="langZh">中文</div>
<div class="pill" id="langEn">EN</div>
<div class="iconBtn" id="soundBtn">🔊</div>
</div>

</div>

</div>

<div class="sigil">
<div class="sigilMark">财</div>
</div>

<div class="cta" id="activate">ACTIVATE FLOW</div>

<div class="row2">
<div class="btn2" id="oracleBtn">ORACLE</div>
<div class="btn2" id="altarBtn">GOLDEN ALTAR</div>
</div>

<div class="card">
<div><b id="forecastTitle">FORECAST</b></div>
<div class="label" id="guidanceTitle">TEMPLE GUIDANCE:</div>
<div class="text" id="guidanceText">Signal: don’t scatter attention. One step — one result.</div>

<div class="actions">
<div class="act" id="enterBtn">ENTER</div>
<div class="act" id="waitBtn">WAIT</div>
<div class="act" id="skipBtn">SKIP</div>
</div>

<div class="foot" id="disclaimer">Ritualized interface. Not financial advice.</div>
</div>

</div>

<script>
let lang="en";
let mode="ritual";

const setActive=(a,b,state)=>{
a.classList.toggle("active",state);
b.classList.toggle("active",!state);
};

document.getElementById("modeRitual").onclick=()=>{
mode="ritual";
setActive(modeRitual,modePro,true);
};

document.getElementById("modePro").onclick=()=>{
mode="pro";
setActive(modeRitual,modePro,false);
};

document.getElementById("langZh").onclick=()=>{
lang="zh";
setActive(langZh,langEn,true);
};

document.getElementById("langEn").onclick=()=>{
lang="en";
setActive(langZh,langEn,false);
};

document.getElementById("helpBtn").onclick=()=>{
alert("Use ACTIVATE FLOW → then ORACLE or ALTAR");
};

document.getElementById("soundBtn").onclick=()=>{
soundBtn.textContent = soundBtn.textContent==="🔊"?"🔇":"🔊";
};

document.getElementById("activate").onclick=()=>{
alert("Flow activated");
};
</script>

</body>
</html>git add index.html
