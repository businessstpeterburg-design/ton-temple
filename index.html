<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>TON TEMPLE</title>

<style>
:root{
--bg0:#050505;
--gold:#d8b35a;
--gold2:#f0d38b;
--text:#f2f2f2;
--muted:rgba(242,242,242,.72);
--safeT:env(safe-area-inset-top);
--safeB:env(safe-area-inset-bottom);
}

*{box-sizing:border-box;min-width:0;}
html,body{margin:0;padding:0;height:100%;overflow-x:hidden;}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
color:var(--text);
background:
radial-gradient(1200px 700px at 50% 20%, rgba(216,179,90,.18) 0%, transparent 55%),
linear-gradient(180deg,#070707,#040404);
}

.app{
padding:calc(14px + var(--safeT)) 14px calc(18px + var(--safeB));
max-width:100vw;
overflow:hidden;
}

.shell{max-width:980px;margin:auto;}

/* HEADER */

.header{
display:flex;
flex-direction:column;
gap:10px;
margin-bottom:16px;
}

.headerTop{
display:flex;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.coin{
width:48px;height:48px;border-radius:999px;position:relative;
background:
radial-gradient(18px 18px at 30% 25%, rgba(255,255,255,.35), transparent 60%),
linear-gradient(180deg,#f0d38b,#6f551f);
border:1px solid rgba(240,211,139,.55);
box-shadow:0 10px 30px rgba(0,0,0,.6),0 0 25px rgba(240,211,139,.25),inset 0 2px 4px rgba(255,255,255,.25),inset 0 -8px 18px rgba(0,0,0,.7);
}

.coin span{
position:absolute;inset:0;display:grid;place-items:center;
font-size:24px;font-weight:900;color:#f6e2a6;
text-shadow:0 0 12px rgba(240,211,139,.6);
}

.brandName{font-size:17px;font-weight:900;letter-spacing:2px;}
.brandTag{font-size:12px;color:var(--muted);}

.headerBottom{
display:flex;
justify-content:space-between;
}

.controlsLeft{display:flex;flex-direction:column;gap:8px;}
.controlsRight{display:flex;flex-direction:column;gap:8px;}

.pillGroup{
display:flex;
gap:4px;
padding:4px;
border-radius:999px;
background:rgba(0,0,0,.3);
border:1px solid rgba(216,179,90,.2);
}

.pill{
padding:10px 14px;
border-radius:999px;
font-weight:800;
font-size:13px;
background:transparent;
color:white;
border:0;
}

.pill.active{
background:linear-gradient(180deg,#f0d38b,#b8963e);
color:#111;
}

.iconBtn{
width:42px;height:42px;border-radius:999px;
border:1px solid rgba(216,179,90,.3);
background:rgba(0,0,0,.3);
color:white;
}

/* MAIN */

.sigil{
aspect-ratio:1/1;
border-radius:22px;
display:grid;
place-items:center;
background:
radial-gradient(circle, rgba(240,211,139,.15), transparent 70%),
rgba(0,0,0,.2);
border:1px solid rgba(216,179,90,.3);
box-shadow:0 20px 60px rgba(0,0,0,.7),inset 0 0 60px rgba(216,179,90,.15);
}

.sigilMark{
font-size:80px;
font-weight:900;
color:#f6e2a6;
text-shadow:0 0 20px rgba(240,211,139,.7);
}

.cta{
margin-top:16px;
width:100%;
padding:16px;
border-radius:999px;
border:1px solid rgba(216,179,90,.3);
background:linear-gradient(180deg,#f0d38b,#b8963e);
font-weight:900;
}

</style>
</head>

<body>
<div class="app">
<div class="shell">

<div class="header">

<div class="headerTop">
<div class="brand">
<div class="coin"><span>财</span></div>
<div>
<div class="brandName">TON TEMPLE</div>
<div class="brandTag">Fa Cai Supreme AI</div>
</div>
</div>
</div>

<div class="headerBottom">

<div class="controlsLeft">
<div class="pillGroup">
<button class="pill active">RITUAL</button>
<button class="pill">PRO</button>
</div>

<div class="pillGroup">
<button class="pill active">中文</button>
<button class="pill">EN</button>
</div>
</div>

<div class="controlsRight">
<button class="iconBtn">?</button>
<button class="iconBtn">🔊</button>
</div>

</div>

</div>

<div class="sigil">
<div class="sigilMark">财</div>
</div>

<button class="cta">ACTIVATE FLOW</button>

</div>
</div>
</body>
</html>
